services:
  nas-movie-wall:
    build: .
    container_name: nas-movie-wall
    restart: unless-stopped
    env_file:
      - path: .env
        required: false
    environment:
      PORT: 3000
      MEDIA_ROOT: /media/movies
      DATA_ROOT: /app/data
      TZ: Asia/Shanghai
    ports:
      - "17174:3000"
    volumes:
      - /mnt/user/Entertain/Movie:/media/movies:ro
      - /mnt/cache/appdata/nas-movie-wall:/app/data
